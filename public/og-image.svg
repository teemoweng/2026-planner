<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Radial vignette on the amber background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%"  stop-color="#231f1a"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>

    <!-- Soft golden glow behind the title -->
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#c9a260" stop-opacity="0.12"/>
      <stop offset="70%"  stop-color="#c9a260" stop-opacity="0"/>
    </radialGradient>

    <!-- Dotted texture pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#e8dcc8" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top-left corner mark -->
  <g stroke="#c9a260" stroke-opacity="0.55" stroke-width="1" fill="none">
    <line x1="60" y1="60" x2="60" y2="110"/>
    <line x1="60" y1="60" x2="110" y2="60"/>
  </g>
  <!-- Bottom-right corner mark -->
  <g stroke="#c9a260" stroke-opacity="0.55" stroke-width="1" fill="none">
    <line x1="1140" y1="570" x2="1140" y2="520"/>
    <line x1="1140" y1="570" x2="1090" y2="570"/>
  </g>

  <!-- Year (small, top) -->
  <text x="600" y="180" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="34" font-weight="400"
        fill="#c9a260" fill-opacity="0.85"
        letter-spacing="12">2 0 2 6</text>

  <!-- Main brand "Margin" -->
  <text x="600" y="345" text-anchor="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="168" font-weight="700"
        fill="#e8dcc8"
        letter-spacing="6">Margin</text>

  <!-- Divider: line — diamond — line -->
  <line x1="400" y1="400" x2="570" y2="400" stroke="#c9a260" stroke-opacity="0.5" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" font-size="16" fill="#c9a260">◆</text>
  <line x1="630" y1="400" x2="800" y2="400" stroke="#c9a260" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#e8dcc8" fill-opacity="0.75"
        letter-spacing="2">Where your year lives in the margins.</text>

  <!-- Footer row -->
  <text x="600" y="560" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="500"
        fill="#c9a260" fill-opacity="0.7"
        letter-spacing="6">电子手账 · AI ASSISTANT · 2026</text>
</svg>
