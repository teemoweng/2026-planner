<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm dark background, amber theme -->
  <rect width="64" height="64" rx="14" fill="#1c1a17"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none"
        stroke="#c9a260" stroke-opacity="0.35" stroke-width="1"/>

  <!-- M — geometric serif, drawn as path so it renders identically everywhere -->
  <path d="M 14 46
           L 14 18
           L 22 18
           L 32 34
           L 42 18
           L 50 18
           L 50 46
           L 44 46
           L 44 28
           L 34 44
           L 30 44
           L 20 28
           L 20 46
           Z"
        fill="#c9a260"/>

  <!-- ◆ diamond accent -->
  <path d="M 32 54 L 34 52 L 32 50 L 30 52 Z" fill="#c9a260"/>
</svg>
